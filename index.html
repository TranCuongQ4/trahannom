<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tra Hán-Nôm</title>
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍🏻</text></svg>" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍🏻</text></svg>" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app">
        <!-- Header với hiệu ứng chớp chớp -->
        <div class="header blink-text">⛩ Tra Hán-Nôm ⛩</div>

        <!-- Search Box -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Xin chỉ nhập 1 chữ thôi ạ..." />
            <button id="searchBtn">Tra</button>
        </div>

        <!-- Result Box -->
        <div class="result-box" id="resultBox">
            <div class="char-list" id="charList">
                <span class="empty-placeholder">🔍 Chỉ Tra Từ Không Giảng Nghĩa</span>
            </div>
        </div>

        <!-- Info -->
        <div class="info-bar" id="infoBar"></div>

        <!-- Footer -->
        <div class="footer">Thiết Kế Trần Cường - Zalo 0907860662</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
